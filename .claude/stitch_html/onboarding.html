<style>
        body {
            background-image: url('https://lh3.googleusercontent.com/aida/ADBb0uiVLctp3oXgk2q6cq2OQHiq3TwbchvRnXLsnVHhqpOBLieDWc6zKiUcXhPOGRYlvlngSKJuFigXCd-FmbH4efBhHrSFwToi3Rh1betiZpQQrRrnDSfEtPRSSZp4yiHuumrtgu0X6OP5l7C6O5rP8eTFHG68YOV0bGzBEPnr421kAgbF6tqWH3WD5LPFs-u8x7AxnX_jJX42NAn1G-2VLBMqD8rbV4mbsOoQuPEy_qUz3EPe8uzxmF0PIK1y');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .glass-panel {
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .floating-element {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .fade-in {
            animation: fadeIn 1.2s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

<body class="font-body-lg text-on-surface">
<!-- Top AppBar (Simplified for Onboarding) -->
<header class="w-full top-0 sticky bg-white/40 backdrop-blur-[24px] border-b border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.08)] flex justify-between items-center px-margin-mobile py-base z-50">
<div class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">
            초록수증 Nature
        </div>
<button class="hover:bg-white/10 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-primary">eco</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-margin-mobile pb-24">
<!-- Visual Content Area -->
<div class="relative w-full flex-1 flex flex-col items-center justify-center max-h-[60vh]">
<!-- Decorative Glow Background -->
<div class="absolute w-[280px] h-[280px] bg-primary/10 rounded-full blur-[80px]"></div>
<!-- Central Visual (Low-poly flower) -->
<div class="relative z-10 floating-element max-w-[280px] w-full">
<img alt="A beautiful low-poly digital sculpture of a flower" class="w-full h-auto drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida/ADBb0ugfklA41Nq8Ax1y2lZOWXO48vZ5Z-yconfHy_fcyc-fqSJAb62fug968w0S6a2ztEMCTDxpR5bv2GAZQCoYE4v5N5KSo9ro3lKIysOPe7kWEci5OFFw2-OcB6X85hGUFq0-QsHJB_nz6c2dlAY7blNn676KE9NrP4475d0AGzS8Ryr6-BeNCuADGCQNEzhIE35RycyKqFN7HxlB-1ICwCVf_SYHrK_wMCWjiIENdPeoIglDEej7vH32nZ5Q"/>
</div>
</div>
<!-- Glassmorphism Card Content -->
<div class="w-full max-w-md glass-panel rounded-radius-outer p-8 flex flex-col items-center gap-6 fade-in">
<div class="text-center space-y-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">
                    성장을 시작하세요
                </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[240px] mx-auto">
                    친환경 소비로 당신만의 꽃을 피워보세요
                </p>
</div>
<!-- Onboarding Step Indicator (Visual Detail) -->
<div class="flex gap-2">
<div class="w-8 h-1 rounded-full bg-primary-container"></div>
<div class="w-2 h-1 rounded-full bg-white/30"></div>
<div class="w-2 h-1 rounded-full bg-white/30"></div>
</div>
<!-- Start Button -->
<button class="w-full py-4 bg-primary text-on-primary font-title-md text-title-md rounded-full shadow-lg active:scale-95 transition-all duration-200 flex items-center justify-center gap-2 group" onclick="handleStart()">
                시작하기
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
<button class="text-on-surface-variant font-label-md text-label-md hover:text-primary transition-colors">
                이미 계정이 있으신가요? <span class="font-bold underline decoration-primary/30">로그인</span>
</button>
</div>
</main>
<!-- Background Decorative Elements (Atmospheric) -->
<div class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed top-[20%] left-[-5%] w-[300px] h-[300px] bg-secondary-container/10 rounded-full blur-[80px] pointer-events-none"></div>
<script>
        function handleStart() {
            const btn = event.currentTarget;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span>`;
            
            // Interaction feedback
            setTimeout(() => {
                btn.style.backgroundColor = '#00c896';
                btn.innerHTML = '준비 완료!';
                
                // Final transition effect
                document.body.style.transition = 'opacity 0.8s ease-out';
                document.body.style.opacity = '0';
            }, 800);
        }

        // Parallax effect on mouse move for desktop (Subtle)
        document.addEventListener('mousemove', (e) => {
            if (window.innerWidth > 768) {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                const flower = document.querySelector('.floating-element');
                flower.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
</body></html>
