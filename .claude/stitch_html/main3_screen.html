<!DOCTYPE html><html lang="ko" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>친환경 소비 앱 메인 - 로우폴리 꽃 버전</title>
<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for better Korean typography -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
<style data-purpose="typography">
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
    </style>
<style data-purpose="custom-layout">
        .bg-pattern {
            background-color: #f8fafc;
            background-image: url('https://lh3.googleusercontent.com/aida/ADBb0uiVLctp3oXgk2q6cq2OQHiq3TwbchvRnXLsnVHhqpOBLieDWc6zKiUcXhPOGRYlvlngSKJuFigXCd-FmbH4efBhHrSFwToi3Rh1betiZpQQrRrnDSfEtPRSSZp4yiHuumrtgu0X6OP5l7C6O5rP8eTFHG68YOV0bGzBEPnr421kAgbF6tqWH3WD5LPFs-u8x7AxnX_jJX42NAn1G-2VLBMqD8rbV4mbsOoQuPEy_qUz3EPe8uzxmF0PIK1y');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        /* Glassmorphism Base Utility */
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
        /* Glassmorphism for Darker Elements (Buttons) */
        .glass-button-primary {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-button-secondary {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px 0 rgba(31, 38, 135, 0.05);
        }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" class=""></head>
<body class="bg-pattern min-h-screen flex justify-center items-start text-slate-800">
<!-- Main Mobile Container -->
<main class="w-full max-w-[390px] min-h-screen flex flex-col pb-8">
<!-- BEGIN: Top Score Section -->
<section class="p-6 flex justify-between items-start" data-purpose="score-summary">
<!-- Main Eco Score Card -->
<div class="glass-card rounded-3xl p-6 w-1/2 flex flex-col justify-center">
<span class="text-[12px] text-teal-700 font-bold mb-1 opacity-80">친환경 소비 점수</span>
<div class="flex items-baseline gap-1">
<span class="text-4xl font-bold text-slate-900">1,250</span>
<span class="text-teal-700 font-bold">P</span>
</div>
</div>
<!-- Right Side Rank Indicators -->
<div class="flex flex-col gap-3 w-[45%]">
<!-- Tier Card -->
<div class="glass-card rounded-2xl p-3 flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white/40 flex items-center justify-center text-orange-500">
<svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
</svg>
</div>
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 font-medium">나의 티어</span>
<span class="text-[13px] font-bold text-slate-800">그린 마스터</span>
</div>
</div>
<!-- Local Rank Card -->
<div class="glass-card rounded-2xl p-3 flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-white/40 flex items-center justify-center text-teal-600">
<svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" fill-rule="evenodd"></path>
</svg>
</div>
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 font-medium">지역 순위</span>
<span class="text-[13px] font-bold text-slate-800">상위 5%</span>
</div>
</div>
</div>
</section>
<!-- END: Top Score Section -->
<!-- BEGIN: Growth Roadmap Section -->
<section class="px-6 mb-8" data-purpose="roadmap">
<div class="glass-card rounded-[32px] p-6">
<div class="flex justify-between items-center mb-6">
<h2 class="text-lg font-bold text-slate-800">성장 로드맵</h2>
<span class="bg-slate-800/80 backdrop-blur-sm text-white text-[10px] px-3 py-1 rounded-full font-bold">Level 2</span>
</div>
<div class="relative flex justify-between items-center px-2">
<!-- Connector Line -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-slate-400/20 -translate-y-[15px] z-0"></div>
<div class="absolute top-1/2 left-0 w-[40%] h-[2px] bg-emerald-500/60 -translate-y-[15px] z-0"></div>
<!-- Step 1: Seed -->
<div class="flex flex-col items-center z-10">
<div class="w-10 h-10 rounded-full bg-emerald-600 shadow-lg shadow-emerald-500/30 flex items-center justify-center text-white mb-2">
<svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-[11px] font-bold text-emerald-700">씨앗</span>
</div>
<!-- Step 2: Sprout -->
<div class="flex flex-col items-center z-10">
<div class="w-10 h-10 rounded-full bg-emerald-600 shadow-lg shadow-emerald-500/30 flex items-center justify-center text-white mb-2">
<svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path>
</svg>
</div>
<span class="text-[11px] font-bold text-emerald-700">새싹</span>
</div>
<!-- Step 3: Small Tree -->
<div class="flex flex-col items-center z-10">
<div class="w-10 h-10 rounded-full bg-white/40 flex items-center justify-center text-slate-400 mb-2 border border-white/20">
<svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM7 9a1 1 0 100-2 1 1 0 000 2zm7-1a1 1 0 11-2 0 1 1 0 012 0zm-7.535 4.01a1 1 0 011.415 0 2.5 2.5 0 003.116 0 1 1 0 111.415 1.414 4.5 4.5 0 01-5.946 0 1 1 0 010-1.414z" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-[11px] font-medium text-slate-400">작은 나무</span>
</div>
<!-- Step 4: Forest -->
<div class="flex flex-col items-center z-10">
<div class="w-10 h-10 rounded-full bg-white/40 flex items-center justify-center text-slate-400 mb-2 border border-white/20">
<svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z"></path>
</svg>
</div>
<span class="text-[11px] font-medium text-slate-400">숲</span>
</div>
</div>
</div>
</section>
<!-- END: Growth Roadmap Section -->
<!-- BEGIN: Plant Display & Progress Section -->
<section class="relative flex-grow flex flex-col items-center px-6" data-purpose="plant-display">
<!-- The Plant Image (Replaced with IMAGE_8) -->
<div class="w-full flex justify-center mb-4 relative"><div class="absolute -top-4 left-1/2 -translate-x-1/2 z-20 bg-white/60 backdrop-blur-md px-4 py-1.5 rounded-full border border-white/40 shadow-sm"><span class="text-emerald-600 font-bold text-sm tracking-wider">두유</span></div>
<img alt="Glassmorphism plant pot" class="w-[280px] h-[280px] object-contain drop-shadow-xl" src="https://lh3.googleusercontent.com/aida/ADBb0ugfklA41Nq8Ax1y2lZOWXO48vZ5Z-yconfHy_fcyc-fqSJAb62fug968w0S6a2ztEMCTDxpR5bv2GAZQCoYE4v5N5KSo9ro3lKIysOPe7kWEci5OFFw2-OcB6X85hGUFq0-QsHJB_nz6c2dlAY7blNn676KE9NrP4475d0AGzS8Ryr6-BeNCuADGCQNEzhIE35RycyKqFN7HxlB-1ICwCVf_SYHrK_wMCWjiIENdPeoIglDEej7vH32nZ5Q">
<button class="absolute bottom-2 right-[calc(50%-140px+8px)] w-12 h-12 glass-card rounded-full flex items-center justify-center text-slate-700 active:scale-90 transition-transform shadow-lg" aria-label="이미지 저장">
  <span class="material-symbols-outlined">
    save_alt
  </span>
</button></div>
<!-- Growth Progress Container -->
<div class="w-full glass-card rounded-[32px] p-6 flex flex-col gap-3">
<div class="flex justify-between items-center text-[13px] font-bold">
<span class="text-slate-700">현재 성장도</span>
<span class="text-emerald-700">75%</span>
</div>
<!-- Progress Bar -->
<div class="w-full bg-white/30 h-3 rounded-full overflow-hidden border border-white/20">
<div class="bg-gradient-to-r from-emerald-400 to-emerald-600 h-full w-[75%] rounded-full shadow-[0_0_12px_rgba(16,185,129,0.4)]"></div>
</div>
<!-- Tip / Info -->
<div class="flex justify-center items-center gap-2 mt-1">
<svg class="h-4 w-4 text-blue-500" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M14.707 10.293a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 111.414-1.414L9 12.586V5a1 1 0 112 0v7.586l2.293-2.293a1 1 0 011.414 0z" fill-rule="evenodd"></path>
</svg>
<span class="text-[12px] text-slate-600">오늘 물을 <span class="font-bold text-slate-800">2번 더</span> 줄 수 있어요!</span>
</div>
</div>
</section>
<!-- END: Plant Display & Progress Section -->
<!-- BEGIN: Action Footer -->
<footer class="mt-auto p-6 flex flex-col gap-4" data-purpose="sticky-actions">
<!-- Main Action Button -->
<button class="glass-button-primary w-full h-16 rounded-[24px] flex items-center justify-center gap-3 active:scale-[0.98] transition-all text-white">
<div class="bg-emerald-500 p-1.5 rounded-full shadow-lg shadow-emerald-500/40">
<svg class="h-5 w-5 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
<span class="text-lg font-bold">영수증 인증하고 물주기</span>
</button>
<!-- Secondary Row -->
<div class="flex gap-4">
<button class="glass-button-secondary flex-grow h-16 rounded-[24px] flex items-center justify-center gap-2 active:scale-[0.98] transition-all">
<svg class="h-5 w-5 text-emerald-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="font-bold text-slate-800">인증 내역</span>
</button>
<button class="glass-button-secondary w-16 h-16 rounded-[24px] flex items-center justify-center text-slate-600 active:scale-[0.95] transition-all">
<svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
</div>
</footer>
<!-- END: Action Footer -->
</main>


</body></html>
