plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
	implementation 'org.springframework.boot:spring-boot-starter-web'//springWeb 라이브러리
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'//jpa 라이브러리
	compileOnly 'org.projectlombok:lombok'//lombok 사용
	annotationProcessor 'org.projectlombok:lombok'
	runtimeOnly 'org.xerial:sqlite-jdbc'
	runtimeOnly 'org.hibernate.orm:hibernate-community-dialects'
	annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'
}

tasks.named('test') {
	useJUnitPlatform()
}
